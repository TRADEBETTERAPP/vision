commands:
  install: npm install && npx shadcn@latest init --defaults --force 2>/dev/null || true
  typecheck: npx tsc --noEmit
  build: npm run build
  test: npm test
  lint: npm run lint

services:
  web:
    start: npm run build && HOSTNAME=127.0.0.1 PORT=3100 npm run start -- --hostname 127.0.0.1 --port 3100
    stop: pids=$(lsof -ti :3100); [ -z "$pids" ] || kill $pids
    healthcheck: curl -sf http://127.0.0.1:3100
    port: 3100
    depends_on: []
